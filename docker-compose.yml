services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      gateway:
        condition: service_healthy

  gateway:
    build:
      context: ./gateway
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      AUTOMATION_MODE: ${AUTOMATION_MODE:-demo}
      HA_URL: ${HA_URL:-http://host.docker.internal:8123}
      HA_TOKEN: ${HA_TOKEN:-}
      HAVEN_PROXY_KEY: ${HAVEN_PROXY_KEY:?Set HAVEN_PROXY_KEY in .env}
      ALLOW_SENSITIVE_ACTIONS: ${ALLOW_SENSITIVE_ACTIONS:-false}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      - web
      - gateway
    environment:
      HAVEN_HOST: ${HAVEN_HOST:-haven.home.arpa}
      HAVEN_PROXY_KEY: ${HAVEN_PROXY_KEY:?Set HAVEN_PROXY_KEY in .env}
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:

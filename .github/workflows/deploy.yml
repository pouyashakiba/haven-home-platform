name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Pull latest and restart services
        run: |
          cd /home/textest/haven-home-platform
          git fetch origin
          git pull --ff-only origin master
          docker compose build web gateway
          docker compose up -d web gateway
          docker compose exec -T caddy caddy validate --config /etc/caddy/Caddyfile
          docker compose restart caddy
          docker compose ps

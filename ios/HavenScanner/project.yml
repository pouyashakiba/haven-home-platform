name: HavenScanner
options:
  bundleIdPrefix: com.haven
  deploymentTarget:
    iOS: "17.0"
targets:
  HavenScanner:
    type: application
    platform: iOS
    sources:
      - HavenScanner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.haven.scanner
        INFOPLIST_FILE: HavenScanner/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
